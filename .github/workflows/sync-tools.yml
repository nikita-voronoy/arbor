name: Sync tools table

# Regenerate the README tools table from code whenever
# the MCP tools file changes on main.

on:
  push:
    branches: [main]
    paths:
      - "crates/arbor-mcp/src/tools.rs"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Update README
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Sync tools table and counts
        run: bash scripts/sync-tools.sh

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: sync tools table from code"
          branch: docs/sync-tools
          delete-branch: true
          title: "docs: sync tools table from code"
          body: |
            Auto-generated by CI — tools table in README was out of sync with code.

            This PR was created automatically by the `sync-tools` workflow.
          labels: documentation
          add-paths: |
            README.md
            CONTRIBUTING.md
