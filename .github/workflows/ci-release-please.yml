name: CI (release-please)

# Release-please PRs are created with GITHUB_TOKEN, which doesn't trigger
# other workflows. This lightweight workflow uses pull_request_target
# (fires for bot PRs) to satisfy the required "Detect changes" check.
# It only runs for the release-please bot and only on CHANGELOG/version changes.

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  changes:
    name: Detect changes
    if: github.actor == 'github-actions[bot]' || github.actor == 'release-please[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "Release-please PR — no code changes to check"
