name: CI

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "install.*"
      - "uninstall.*"
      - "test_install.*"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Always runs — gate for branch protection
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      installer: ${{ steps.filter.outputs.installer }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            installer:
              - 'install.*'
              - 'uninstall.*'
              - 'test_install.*'

  # Conventional commits — only on PRs
  lint-pr:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            ci
            chore
            build
            revert

  # Single job: fmt → clippy → test (sequential, one Rust install)
  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Test
        run: cargo test --all

  # Installer tests — bash (Linux + macOS)
  installer-bash:
    name: Installer (bash)
    needs: changes
    if: needs.changes.outputs.installer == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        if: runner.os == 'Linux'
        run: sudo apt-get -qq install -y jq
      - name: Run installer tests
        run: bash test_install.sh

  # Installer tests — PowerShell (Windows)
  installer-pwsh:
    name: Installer (pwsh)
    needs: changes
    if: needs.changes.outputs.installer == 'true'
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run installer tests
        shell: pwsh
        run: ./test_install.ps1
