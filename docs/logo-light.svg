<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Tree symbol -->
  <g transform="translate(60, 60)">
    <!-- Trunk -->
    <line x1="0" y1="8" x2="0" y2="40" stroke="#5A6B8A" stroke-width="3" stroke-linecap="round"/>
    <!-- Root branches -->
    <line x1="0" y1="40" x2="-14" y2="52" stroke="#5A6B8A" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="14" y2="52" stroke="#5A6B8A" stroke-width="2" stroke-linecap="round"/>
    <!-- Crown branches -->
    <line x1="0" y1="8" x2="-22" y2="-18" stroke="#3A8A5C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="22" y2="-18" stroke="#3A8A5C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#3A8A5C" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Leaf nodes -->
    <circle cx="-22" cy="-18" r="5" fill="#3A8A5C"/>
    <circle cx="22" cy="-18" r="5" fill="#3A8A5C"/>
    <circle cx="0" cy="-28" r="5" fill="#3A8A5C"/>
    <!-- Sub-branches -->
    <line x1="-22" y1="-18" x2="-34" y2="-32" stroke="#3A8A5C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-22" y1="-18" x2="-12" y2="-34" stroke="#3A8A5C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="-18" x2="12" y2="-34" stroke="#3A8A5C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="-18" x2="34" y2="-32" stroke="#3A8A5C" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Sub-leaf nodes -->
    <circle cx="-34" cy="-32" r="3.5" fill="#5AAE78"/>
    <circle cx="-12" cy="-34" r="3.5" fill="#5AAE78"/>
    <circle cx="12" cy="-34" r="3.5" fill="#5AAE78"/>
    <circle cx="34" cy="-32" r="3.5" fill="#5AAE78"/>
    <!-- Connection dots at roots -->
    <circle cx="-14" cy="52" r="3" fill="#4A5B7A"/>
    <circle cx="14" cy="52" r="3" fill="#4A5B7A"/>
  </g>
  <!-- Text: arbor -->
  <text x="120" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="300" letter-spacing="-1" fill="#1A2332">arbor</text>
</svg>
